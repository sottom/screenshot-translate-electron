<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline';">
    <title>Selector</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: rgba(0, 0, 0, 0.2);
      }
      canvas { display: block; }
      #rect {
        position: absolute;
        box-sizing: border-box;
        border: 1px dashed #00f5ff;
        background: rgba(0, 245, 255, 0.12);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.7) inset,
          0 0 10px rgba(0, 245, 255, 0.45);
        border-radius: 4px;
      }
      #hint {
        position: fixed;
        left: 12px;
        top: 12px;
        color: white;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        padding: 8px 12px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div id="hint">Drag to select region. Esc to cancel.</div>
    <div id="rect" style="display:none"></div>
    <script src="selector.js"></script>
  </body>
</html>
