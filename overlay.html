<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
    <title>Overlay</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; }
      body{
        padding:14px 16px;
        background: rgba(15, 18, 24, 0.94);
        color: #eef2ff;
        font-family:system-ui, sans-serif;
        border-radius:12px;
        line-height:1.45;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 14px 36px rgba(5, 8, 14, 0.45);
      }
      .original{
        font-size:30px;
        font-weight:700;
        margin-bottom:10px;
        letter-spacing:0.01em;
      }
      .original .token { display: inline-block; margin-right: 0.14em; }
      .original .save-token{
        cursor: pointer;
        border-radius: 6px;
        padding: 0 2px;
        transition: background 0.12s ease;
      }
      .original .save-token:hover{
        background: rgba(255, 255, 255, 0.14);
      }
      .original ruby { margin-right: 0.18em; }
      ruby rt { font-size: 0.45em; opacity: 0.9; }
      .kanji-char{
        cursor: pointer;
        text-decoration: underline dotted rgba(255, 255, 255, 0.42);
        text-underline-offset: 0.12em;
      }
      .kanji-char:hover{
        color: #c4b5fd;
      }
      .definition{
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .section{
        position: relative;
      }
      .loading-indicator{
        display: none;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        opacity: 0.9;
        margin: 4px 0 6px;
      }
      .spinner{
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255,255,255,0.28);
        border-top-color: rgba(255,255,255,0.95);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .dimmed{
        opacity: 0.45;
      }
      .translation{
        margin-bottom: 10px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(109, 165, 255, 0.15);
        border: 1px solid rgba(109, 165, 255, 0.3);
      }
      .translation-label{
        font-size: 15px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        opacity: 0.85;
        margin-bottom: 2px;
      }
      .translation-text{
        font-size: 22px;
        line-height: 1.35;
        color: #e8f1ff;
      }
      .def-entry{
        font-size: 22px;
        line-height: 1.4;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .def-term{
        font-weight: 700;
        margin-right: 0.35em;
      }
      .def-meaning{
        opacity: 0.98;
        word-break: break-word;
      }
      .def-senses{
        margin: 6px 0 0 1.1em;
        padding: 0;
      }
      .def-sense{
        font-size: 20px;
        line-height: 1.35;
        margin: 2px 0;
      }
      .def-empty{
        font-size: 20px;
        opacity: 0.9;
      }
      .kanji-panel{
        display: none;
        position: fixed;
        z-index: 50;
        min-width: 320px;
        max-width: min(560px, calc(100vw - 24px));
        padding: 10px;
        border-radius: 8px;
        background: rgba(30, 50, 80, 0.95);
        border: 1px solid rgba(150, 190, 255, 0.42);
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.5);
      }
      .kanji-panel-close{
        position: absolute;
        top: 6px;
        right: 8px;
        border: 1px solid rgba(255,255,255,0.35);
        background: rgba(255,255,255,0.14);
        color: white;
        border-radius: 6px;
        font-size: 13px;
        line-height: 1;
        padding: 4px 7px;
        cursor: pointer;
      }
      .kanji-header{
        display: flex;
        align-items: baseline;
        gap: 10px;
        margin-bottom: 8px;
        padding-right: 34px;
      }
      .kanji-literal{
        font-size: 30px;
        font-weight: 700;
      }
      .kanji-meta{
        font-size: 13px;
        opacity: 0.9;
      }
      .kanji-row{
        font-size: 15px;
        margin-top: 3px;
      }
      .kanji-row-label{
        font-weight: 700;
        margin-right: 0.35em;
      }
      .toolbar{
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        margin-bottom: 8px;
      }
      .close-overlay{
        margin-left: 4px;
        border: 1px solid rgba(255,255,255,0.22);
        background: rgba(255,255,255,0.08);
        color: #dbe4ff;
        border-radius: 999px;
        font-size: 13px;
        line-height: 1;
        width: 24px;
        height: 24px;
        cursor: pointer;
      }
      .saved-count{
        margin-right: auto;
        font-size: 12px;
        color: #a5b4fc;
        opacity: 0.95;
      }
      .tool-btn{
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(255,255,255,0.08);
        color: #e6ecff;
        font-size: 12px;
        border-radius: 6px;
        padding: 5px 8px;
        cursor: pointer;
      }
      .status{
        display: none;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(129, 140, 248, 0.12);
        border: 1px solid rgba(129, 140, 248, 0.35);
      }
      .status.error{
        background: rgba(255, 120, 120, 0.12);
        border-color: rgba(255, 120, 120, 0.42);
      }
      .status-title{
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .status-subtext{
        font-size: 14px;
        opacity: 0.9;
        margin-bottom: 8px;
      }
      .status-progress-wrap{
        width: 100%;
        height: 10px;
        border-radius: 999px;
        background: rgba(255,255,255,0.2);
        overflow: hidden;
        margin-bottom: 4px;
      }
      .status-progress-bar{
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #818cf8 0%, #60a5fa 100%);
      }
      .status-progress-label{
        font-size: 13px;
        opacity: 0.95;
      }
      .review-card{
        display: none;
        margin-bottom: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(192, 132, 252, 0.5);
        background: rgba(192, 132, 252, 0.14);
      }
      .review-label{
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 4px;
        opacity: 0.92;
      }
      .review-meta{
        font-size: 12px;
        opacity: 0.9;
        margin-bottom: 8px;
        color: #e9ddff;
      }
      .review-sentence{
        font-size: 28px;
        font-weight: 700;
        line-height: 1.35;
      }
      .review-highlight{
        color: #f0abfc;
        font-weight: 800;
      }
      .review-focus-word{
        position: relative;
        display: inline-block;
        cursor: help;
      }
      .review-hover-word{
        position: relative;
        display: inline-block;
        cursor: help;
      }
      .review-hover-word[data-reading]:hover::after,
      .review-focus-word[data-reading]:hover::after{
        content: attr(data-reading);
        position: absolute;
        left: 50%;
        bottom: calc(100% + 8px);
        transform: translateX(-50%);
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.02em;
        white-space: nowrap;
        color: #eef2ff;
        background: rgba(25, 31, 46, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 6px;
        padding: 3px 8px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
        pointer-events: none;
        z-index: 5;
      }
      .review-translation{
        margin-top: 8px;
        font-size: 18px;
        color: #e9ddff;
      }
      .review-actions{
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .review-btn{
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(255,255,255,0.08);
        color: #eef2ff;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        padding: 6px 10px;
        cursor: pointer;
      }
      .review-btn.again{
        border-color: rgba(248, 113, 113, 0.45);
      }
      .review-btn.good{
        border-color: rgba(96, 165, 250, 0.45);
      }
      .review-btn.easy{
        border-color: rgba(52, 211, 153, 0.45);
      }
      .save-feedback{
        display: none;
        margin-bottom: 8px;
        font-size: 13px;
        color: #9ae6b4;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <div class="saved-count" id="saved-count">Saved words: 0</div>
      <button class="tool-btn" id="copy-original">Copy JP</button>
      <button class="tool-btn" id="copy-translation">Copy EN</button>
      <button class="close-overlay" id="close-overlay" title="Close">X</button>
    </div>
    <div class="status" id="status">
      <div class="status-title" id="status-title"></div>
      <div class="status-subtext" id="status-subtext"></div>
      <div class="status-progress-wrap">
        <div class="status-progress-bar" id="status-progress-bar"></div>
      </div>
      <div class="status-progress-label" id="status-progress-label"></div>
    </div>
    <div class="save-feedback" id="save-feedback"></div>
    <div class="review-card" id="review-card">
      <div class="review-label">Review</div>
      <div class="review-meta" id="review-meta"></div>
      <div class="review-sentence" id="review-sentence"></div>
      <div class="review-translation" id="review-translation"></div>
      <div class="review-actions">
        <button class="review-btn again" id="review-again">Again</button>
        <button class="review-btn good" id="review-good">Good</button>
        <button class="review-btn easy" id="review-easy">Easy</button>
        <button class="review-btn" id="review-snooze">Snooze 10m</button>
      </div>
    </div>
    <div class="section">
      <div class="loading-indicator" id="loading-original"><span class="spinner"></span><span>Reading text...</span></div>
      <div class="original" id="original"></div>
    </div>
    <div class="section">
      <div class="loading-indicator" id="loading-translation"><span class="spinner"></span><span>Translating sentence...</span></div>
      <div class="translation" id="translation" style="display:none;">
      <div class="translation-label">English</div>
      <div class="translation-text" id="translation-text"></div>
    </div>
    </div>
    <div class="section">
      <div class="loading-indicator" id="loading-definition"><span class="spinner"></span><span>Looking up definitions...</span></div>
      <div class="definition" id="definition"></div>
    </div>
    <div class="kanji-panel" id="kanji-panel"></div>
    <script src="overlay.js"></script>
  </body>
</html>
